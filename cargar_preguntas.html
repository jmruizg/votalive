function log(msg,cls=''){
  const el=document.getElementById('log');
  el.innerHTML+=`<div class="${cls}">${msg}</div>`;
  el.scrollTop=el.scrollHeight;
}

async function cargar(){
  document.getElementById('log').innerHTML='';
  log('Leyendo estado actual...');
  try{
    const r=await fetch(`${BASE}/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':API_KEY}});
    if(!r.ok)throw new Error('Error leyendo JSONBin: '+r.status);
    const data=await r.json();
    const current=data.record||{};

    // Keep meta fields, replace questions
    const newState={
      ...current,
      currentQIndex:0,
      votingOpen:false,
      timerEnd:null,
      timerDuration:30,
      questions:PREGUNTAS
    };

    log('Guardando 10 preguntas...');
    const w=await fetch(`${BASE}/b/${BIN_ID}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},
      body:JSON.stringify(newState)
    });
    if(!w.ok)throw new Error('Error guardando: '+w.status);

    log('✅ ¡Listo! Las 10 preguntas están cargadas.','ok');
    log('Abre manageVota.html para verlas.','ok');
  }catch(e){
    log('❌ Error: '+e.message,'err');
  }
}
