<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VotaLive — Control</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--border:rgba(255,255,255,0.08);--accent:#7c6ff7;--accent2:#f7c06f;--accent3:#6ff7c0;--text:#f0eff8;--muted:rgba(240,239,248,0.45);--danger:#f76f6f;--radius:16px;--radius-sm:12px;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;}

  .header{padding:1rem 1.25rem 0.75rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface);}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;}
  .logo span{color:var(--accent);}
  .badge{display:inline-flex;align-items:center;gap:5px;padding:0.2rem 0.6rem;border-radius:999px;font-size:0.72rem;font-weight:500;}
  .badge-live{background:rgba(111,247,192,0.12);color:var(--accent3);border:1px solid rgba(111,247,192,0.25);}
  .badge-waiting{background:rgba(247,192,111,0.12);color:var(--accent2);border:1px solid rgba(247,192,111,0.25);}
  .badge-closed{background:rgba(247,111,111,0.12);color:var(--danger);border:1px solid rgba(247,111,111,0.25);}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

  .timer-bar{height:4px;background:var(--surface2);}
  .timer-bar-fill{height:100%;background:var(--accent);transition:width 1s linear;}
  .timer-bar-fill.urgent{background:var(--danger);}

  .main{flex:1;padding:1.25rem;display:flex;flex-direction:column;gap:1rem;overflow-y:auto;}

  /* Current question card */
  .q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;}
  .q-card-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;}
  .q-card-num{font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;}
  .q-card-type{font-size:0.7rem;padding:2px 8px;border-radius:4px;background:rgba(124,111,247,0.15);color:var(--accent);}
  .q-card-text{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;line-height:1.3;}
  .vote-count{font-size:0.8rem;color:var(--muted);margin-top:0.5rem;}

  /* Timer display */
  .timer-display{text-align:center;padding:0.5rem 0;}
  .timer-num{font-family:'Syne',sans-serif;font-size:3rem;font-weight:800;color:var(--accent);}
  .timer-num.urgent{color:var(--danger);}
  .timer-label{font-size:0.75rem;color:var(--muted);}

  /* Buttons */
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:1rem;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:500;cursor:pointer;border:none;transition:all 0.15s;width:100%;}
  .btn:active{transform:scale(0.97);}
  .btn-launch{background:var(--accent);color:#fff;font-size:1.1rem;padding:1.25rem;}
  .btn-launch:hover{background:#6a5ef0;}
  .btn-close{background:rgba(247,111,111,0.15);color:var(--danger);border:1px solid rgba(247,111,111,0.3);}
  .btn-nav{background:var(--surface2);color:var(--text);border:1px solid var(--border);flex:1;}
  .btn-nav:hover{background:rgba(255,255,255,0.07);}
  .btn-nav:disabled{opacity:0.3;cursor:not-allowed;}
  .nav-row{display:flex;gap:0.75rem;}

  /* Timer select */
  .timer-row{display:flex;align-items:center;gap:0.75rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.75rem 1rem;}
  .timer-row label{font-size:0.85rem;color:var(--muted);flex-shrink:0;}
  .select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;padding:0.4rem 0.75rem;outline:none;flex:1;}

  /* Progress dots */
  .progress{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;padding:0.5rem 0;}
  .pdot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.12);transition:all 0.3s;}
  .pdot.active{background:var(--accent);width:20px;border-radius:4px;}
  .pdot.done{background:rgba(124,111,247,0.4);}

  /* Login */
  .login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;width:100%;max-width:340px;text-align:center;}
  .login-logo{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:0.25rem;}
  .login-logo span{color:var(--accent);}
  .login-sub{color:var(--muted);font-size:0.85rem;margin-bottom:1.5rem;}
  .input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.75rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:1rem;outline:none;margin-bottom:0.75rem;}
  .input:focus{border-color:var(--accent);}
  .error{color:var(--danger);font-size:0.82rem;margin-top:0.25rem;}

  .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:1rem auto;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.6rem 1.1rem;font-size:0.85rem;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,0.5);z-index:999;white-space:nowrap;animation:toast-in 0.3s ease;}
  @keyframes toast-in{from{opacity:0;transform:translateX(-50%) translateY(6px)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" style="display:flex;flex-direction:column;flex:1">
  <div class="header">
    <div class="logo">vota<span>live</span> <small style="font-size:0.65rem;opacity:0.5;font-weight:400">control</small></div>
  </div>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">vota<span>live</span></div>
      <p class="login-sub">Control remoto del presentador</p>
      <input class="input" id="pwd-input" type="password" placeholder="Contraseña..." onkeydown="if(event.key==='Enter')Ctrl.login()"/>
      <button class="btn btn-launch" onclick="Ctrl.login()">Entrar</button>
      <div id="login-error" class="error" style="display:none"></div>
      <div id="login-spinner" style="display:none"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- MAIN CONTROL -->
<div id="ctrl-screen" style="display:none;flex-direction:column;flex:1">
  <div class="header">
    <div class="logo">vota<span>live</span> <small style="font-size:0.65rem;opacity:0.5;font-weight:400">control</small></div>
    <span id="c-badge" class="badge badge-waiting">⏸ En espera</span>
  </div>
  <div class="timer-bar"><div id="c-timer-bar" class="timer-bar-fill" style="width:0%"></div></div>

  <div class="main">
    <!-- Progress dots -->
    <div class="progress" id="c-progress"></div>

    <!-- Current question -->
    <div class="q-card">
      <div class="q-card-meta">
        <span class="q-card-num" id="c-q-num">Pregunta –</span>
        <span class="q-card-type" id="c-q-type"></span>
      </div>
      <div class="q-card-text" id="c-q-text">Cargando...</div>
      <div class="vote-count" id="c-vote-count"></div>
    </div>

    <!-- Timer display (when open) -->
    <div class="timer-display" id="c-timer-display" style="display:none">
      <div class="timer-num" id="c-timer-num">–</div>
      <div class="timer-label">segundos restantes</div>
    </div>

    <!-- Timer select -->
    <div class="timer-row" id="c-timer-row">
      <label>Tiempo</label>
      <select class="select" id="c-timer-select">
        <option value="10">10 s</option>
        <option value="15">15 s</option>
        <option value="30" selected>30 s</option>
        <option value="45">45 s</option>
        <option value="60">1 min</option>
        <option value="90">1:30</option>
        <option value="120">2 min</option>
      </select>
    </div>

    <!-- Action buttons -->
    <button id="c-btn-launch" class="btn btn-launch" onclick="Ctrl.launch()">▶ Lanzar votación</button>
    <button id="c-btn-close" class="btn btn-close" style="display:none" onclick="Ctrl.closeEarly()">⏹ Cerrar ahora</button>

    <!-- Nav -->
    <div class="nav-row">
      <button id="c-btn-prev" class="btn btn-nav" onclick="Ctrl.prev()">← Anterior</button>
      <button id="c-btn-next" class="btn btn-nav" onclick="Ctrl.next()">Siguiente →</button>
    </div>
  </div>
</div>

<script>
const JSONBIN_BASE='https://api.jsonbin.io/v3';
const HARDCODED_CONFIG={apiKey:'$2a$10$ZoE/x.0qlAY2CUIUidanZ.DlIQaDHdWgHcTVMehACupi3bnCbOAoK',binId:'6a162f1b8ef04f45381f56a5'};
const TYPE_LABELS={mc:'Opción múltiple',multi:'Selección múltiple',word:'Nube de palabras',star:'Valoración',slider:'Slider',slide:'Transición'};

let state=null,pollTimer=null,localTimer=null,isSaving=false;

async function readBin(){
  const r=await fetch(`${JSONBIN_BASE}/b/${HARDCODED_CONFIG.binId}/latest`,{headers:{'X-Master-Key':HARDCODED_CONFIG.apiKey}});
  if(!r.ok)throw new Error();return(await r.json()).record;
}
async function writeBin(s){
  if(isSaving)return;isSaving=true;
  try{await fetch(`${JSONBIN_BASE}/b/${HARDCODED_CONFIG.binId}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':HARDCODED_CONFIG.apiKey},body:JSON.stringify(s)});state=s;}
  finally{isSaving=false;}
}

const Ctrl={
  async login(){
    const pwd=document.getElementById('pwd-input').value.trim();
    const err=document.getElementById('login-error');err.style.display='none';
    if(!pwd){err.textContent='Introduce la contraseña.';err.style.display='block';return;}
    document.getElementById('login-spinner').style.display='block';
    let s;
    try{s=await readBin();}catch(e){err.textContent='Error de conexión.';err.style.display='block';document.getElementById('login-spinner').style.display='none';return;}
    if(!s.accessPassword){err.textContent='No hay contraseña definida. Configúrala en manageVota.html.';err.style.display='block';document.getElementById('login-spinner').style.display='none';return;}
    if(s.accessPassword!==pwd){err.textContent='Contraseña incorrecta.';err.style.display='block';document.getElementById('login-spinner').style.display='none';return;}
    state=s;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('ctrl-screen').style.display='flex';
    Ctrl.render();
    pollTimer=setInterval(Ctrl.poll,2500);
    localTimer=setInterval(Ctrl.tick,500);
  },

  async poll(){
    try{
      const f=await readBin();if(!f||!f.questions)return;
      const ci=state.currentQIndex;state=f;state.currentQIndex=ci;
      Ctrl.render();
    }catch(e){}
  },

  tick(){
    if(!state)return;
    Ctrl.updateTimer();
    if(state.votingOpen&&state.timerEnd&&Math.ceil((state.timerEnd-Date.now())/1000)<=0)Ctrl.closeVoting();
  },

  render(){
    if(!state)return;
    const q=state.questions[state.currentQIndex];
    const total=Object.keys(q?.votes||{}).length;
    document.getElementById('c-q-num').textContent=`Pregunta ${state.currentQIndex+1} de ${state.questions.length}`;
    document.getElementById('c-q-type').textContent=TYPE_LABELS[q?.type]||q?.type||'';
    document.getElementById('c-q-text').textContent=q?.text||'–';
    document.getElementById('c-vote-count').textContent=total?`${total} voto${total!==1?'s':''}` :'Sin votos aún';
    document.getElementById('c-progress').innerHTML=state.questions.map((_,i)=>`<div class="pdot ${i===state.currentQIndex?'active':i<state.currentQIndex?'done':''}"></div>`).join('');
    // Sync timer select with question duration
    const ts=document.getElementById('c-timer-select');
    if(ts&&q?.duration){
      let found=false;
      for(const opt of ts.options){if(parseInt(opt.value)===q.duration){ts.value=opt.value;found=true;break;}}
      if(!found){const opt=document.createElement('option');opt.value=q.duration;opt.textContent=q.duration+'s';ts.appendChild(opt);ts.value=q.duration;}
    }
    Ctrl.updateTimer();
  },

  updateTimer(){
    if(!state)return;
    const open=state.votingOpen,end=state.timerEnd,dur=state.timerDuration||30;
    const rem=end?Math.max(0,Math.ceil((end-Date.now())/1000)):0;
    const pct=end?(Math.max(0,(end-Date.now()))/(dur*1000))*100:0;
    const urgent=rem<=10&&rem>0&&open;
    const q=state.questions[state.currentQIndex];
    const isSlide=q?.type==='slide';
    const hasVotes=Object.keys(q?.votes||{}).length>0;

    // Badge
    const badge=document.getElementById('c-badge');
    if(open){badge.className='badge badge-live';badge.innerHTML='<span class="dot"></span> Votando';}
    else{badge.className='badge badge-waiting';badge.textContent='⏸ En espera';}

    // Timer bar
    const bar=document.getElementById('c-timer-bar');
    bar.style.width=(open?pct:0)+'%';bar.className='timer-bar-fill'+(urgent?' urgent':'');

    // Timer display
    const td=document.getElementById('c-timer-display');
    const tn=document.getElementById('c-timer-num');
    if(open&&end){td.style.display='block';tn.textContent=rem;tn.className='timer-num'+(urgent?' urgent':'');}
    else td.style.display='none';

    // Timer row + launch/close
    document.getElementById('c-timer-row').style.display=open?'none':'flex';
    document.getElementById('c-btn-launch').style.display=open?'none':'flex';
    document.getElementById('c-btn-close').style.display=open?'flex':'none';

    // Nav — prev/next always visible, disabled only when voting is open
    const bprev=document.getElementById('c-btn-prev');
    const bnext=document.getElementById('c-btn-next');
    bprev.disabled=open||state.currentQIndex===0;
    bnext.disabled=open||state.currentQIndex>=state.questions.length-1;
  },

  async launch(){
    const dur=parseInt(document.getElementById('c-timer-select').value);
    state.votingOpen=true;state.timerEnd=Date.now()+(dur*1000);state.timerDuration=dur;
    await writeBin(state);Ctrl.render();
  },
  async closeEarly(){await Ctrl.closeVoting();showToast('⏹ Votación cerrada');},
  async closeVoting(){state.votingOpen=false;state.timerEnd=null;await writeBin(state);Ctrl.render();},
  async next(){
    state.votingOpen=false;state.timerEnd=null;
    if(state.currentQIndex<state.questions.length-1)state.currentQIndex++;
    await writeBin(state);Ctrl.render();
  },
  async prev(){
    state.votingOpen=false;state.timerEnd=null;
    if(state.currentQIndex>0)state.currentQIndex--;
    await writeBin(state);Ctrl.render();
  }
};

function showToast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2000);}

window.addEventListener('load',()=>document.getElementById('pwd-input')?.focus());
</script>
</body>
</html>
