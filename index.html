<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VotaLive</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--border:rgba(255,255,255,0.08);--accent:#7c6ff7;--accent2:#f7c06f;--accent3:#6ff7c0;--text:#f0eff8;--muted:rgba(240,239,248,0.45);--radius:16px;--radius-sm:10px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background-image:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(124,111,247,0.18) 0%,transparent 70%);}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem;width:100%;max-width:400px;text-align:center;}
  .logo{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:0.25rem;}
  .logo span{color:var(--accent);}
  .sub{color:var(--muted);font-size:0.9rem;margin-bottom:2.5rem;line-height:1.5;}
  .btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:1rem 1.5rem;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:500;cursor:pointer;border:none;transition:all 0.18s;text-decoration:none;margin-bottom:0.75rem;}
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:#6a5ef0;}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  .btn-secondary:hover{background:rgba(255,255,255,0.07);}
  .btn-icon{font-size:1.2rem;}
  .divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;color:var(--muted);font-size:0.78rem;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
  .footer{margin-top:1.5rem;font-size:0.75rem;color:rgba(240,239,248,0.2);}
</style>
</head>
<body>
<div class="card">
  <div class="logo">vota<span>live</span></div>
  <p class="sub">Interacción en tiempo real<br>para tu presentación</p>
  <a class="btn btn-primary" href="vote.html">
    <span class="btn-icon">🗳️</span> Quiero votar
  </a>
  <a class="btn btn-secondary" href="results.html">
    <span class="btn-icon">📊</span> Ver resultados en vivo
  </a>
  <div class="divider"></div>
  <p class="footer">¿Eres el presentador? Accede desde el enlace privado.</p>
</div>
</body>
</html>
